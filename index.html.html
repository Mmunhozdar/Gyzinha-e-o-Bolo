<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gyzinha em Busca do Bolo de Aniversário Sequestrado!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a2e; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #gameContainer { position: relative; width: 100%; max-width: 800px; }
  canvas { display: block; width: 100%; height: auto; border: 3px solid #ff69b4; border-radius: 10px; box-shadow: 0 0 30px #ff69b480; }
  #ui { position: absolute; top: 6px; left: 6px; right: 6px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; }
  .hud-box { background: rgba(0,0,0,0.6); border: 2px solid #ff69b4; border-radius: 8px; padding: 2px 8px; color: #fff; font-family: 'Fredoka One', cursive; font-size: 14px; }
  #controls { display: none; }
  #mobileControls { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: flex-end; padding: 8px 10px; gap: 8px; user-select: none; }
  .ctrl-group { display: flex; gap: 6px; }
  .btn { width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); background: rgba(255,105,180,0.35); color: #fff; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.1s; active: background rgba(255,105,180,0.7); }
  .btn:active, .btn.pressed { background: rgba(255,105,180,0.75); border-color: #ff69b4; transform: scale(0.93); }
  .btn-action { width: 70px; height: 70px; background: rgba(255,215,0,0.35); border-color: rgba(255,215,0,0.5); font-size: 28px; }
  .btn-action:active, .btn-action.pressed { background: rgba(255,215,0,0.75); }
  .btn-attack { background: rgba(255,80,0,0.35); border-color: rgba(255,80,0,0.5); }
  .btn-attack:active, .btn-attack.pressed { background: rgba(255,80,0,0.75); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div id="ui">
    <div class="hud-box">❤️ <span id="hpDisplay">3</span></div>
    <div class="hud-box" id="phaseTitle">Fase 1</div>
    <div class="hud-box">⭐ <span id="scoreDisplay">0</span></div>
  </div>
</div>
<div id="mobileControls">
  <div class="ctrl-group">
    <div class="btn" id="btnLeft">◀</div>
    <div class="btn" id="btnRight">▶</div>
  </div>
  <div class="ctrl-group">
    <div class="btn btn-attack" id="btnAttack">💥</div>
    <div class="btn btn-action" id="btnJump">⬆</div>
  </div>
</div>
<div id="controls"><span>← →</span> Mover &nbsp; <span>↑ / Espaço</span> Pular &nbsp; <span>Z</span> Atacar</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

// ═══════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════
let state = 'TITLE'; // TITLE, PLAYING, PHASE_END, GAME_OVER, WIN
let phase = 1;
let score = 0;
let hp = 3;
let keys = {};
let particles = [];
let time = 0;
let phaseEndTimer = 0;
let phaseEndMessage = '';
let phaseEndColor = '#ff69b4';
let transitionAlpha = 0;
let transitioning = false;

// ═══════════════════════════════════════════
// SPRITE DRAWING HELPERS (pixel art style)
// ═══════════════════════════════════════════
function drawGyzinha(x, y, dir, frame, attack) {
  ctx.save();
  ctx.translate(x, y);
  if (dir < 0) { ctx.scale(-1,1); }
  // Hair long brown
  ctx.fillStyle = '#6b3a1f';
  ctx.fillRect(-10, -52, 20, 10);
  ctx.fillRect(-12, -48, 4, 20);
  ctx.fillRect(8, -48, 4, 20);
  // Face
  ctx.fillStyle = '#f5c5a3';
  ctx.fillRect(-8, -48, 16, 16);
  // Eyes
  ctx.fillStyle = '#3b2010';
  ctx.fillRect(-5, -44, 4, 4);
  ctx.fillRect(2, -44, 4, 4);
  // Smile
  ctx.fillStyle = '#c0505a';
  ctx.fillRect(-4, -36, 8, 2);
  // Body - pink top
  ctx.fillStyle = '#ff69b4';
  ctx.fillRect(-9, -32, 18, 16);
  // Jeans
  ctx.fillStyle = '#3a6ea8';
  ctx.fillRect(-9, -16, 18, 14);
  // Legs
  let legOff = Math.sin(frame*0.4)*4;
  ctx.fillStyle = '#3a6ea8';
  ctx.fillRect(-8, -2, 7, 10+legOff);
  ctx.fillRect(1, -2, 7, 10-legOff);
  // Shoes
  ctx.fillStyle = '#ff69b4';
  ctx.fillRect(-10, 8+legOff, 8, 5);
  ctx.fillRect(-1, 8-legOff, 8, 5);
  // Attack arm
  if (attack > 0) {
    ctx.fillStyle = '#f5c5a3';
    ctx.fillRect(9, -30, 20, 6);
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(30, -27, 8, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ff6600';
    ctx.font = 'bold 10px Fredoka One';
    ctx.fillText('💥', 22, -20);
  }
  ctx.restore();
}

function drawVillain(x, y, frame) {
  ctx.save();
  ctx.translate(x, y);
  // Bald head
  ctx.fillStyle = '#d4905a';
  ctx.fillRect(-14, -60, 28, 24);
  // Mean eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(-9, -54, 6, 6);
  ctx.fillRect(3, -54, 6, 6);
  // Angry brows
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-11,-57); ctx.lineTo(-3,-55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11,-57); ctx.lineTo(3,-55); ctx.stroke();
  // Mustache
  ctx.fillStyle = '#222';
  ctx.fillRect(-6,-44,12,4);
  // Tattoos on head
  ctx.fillStyle = '#1a3a6a';
  ctx.font = '8px serif';
  ctx.fillText('⚡', -4, -60);
  // Big muscular body
  ctx.fillStyle = '#222';
  ctx.fillRect(-18, -36, 36, 20);
  // Muscles
  ctx.fillStyle = '#d4905a';
  ctx.fillRect(-22, -34, 8, 16);
  ctx.fillRect(14, -34, 8, 16);
  // Tattoos on arms
  ctx.fillStyle = '#1a3a6a';
  ctx.font = '9px serif';
  ctx.fillText('💀', -24, -24);
  ctx.fillText('🔥', 15, -24);
  // Shorts
  ctx.fillStyle = '#8B0000';
  ctx.fillRect(-16, -16, 32, 14);
  // Legs
  let legOff = Math.sin(frame*0.3)*5;
  ctx.fillStyle = '#d4905a';
  ctx.fillRect(-14, -2, 11, 14+legOff);
  ctx.fillRect(3, -2, 11, 14-legOff);
  ctx.restore();
}

function drawMicaela(x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Light hair
  ctx.fillStyle = '#e8c080';
  ctx.fillRect(-8, -32, 16, 8);
  ctx.fillRect(-4, -28, 4, 4); // hair clip
  ctx.fillStyle = '#4169e1';
  ctx.fillRect(-4, -30, 5, 4);
  // Face
  ctx.fillStyle = '#f5c5a3';
  ctx.fillRect(-7, -28, 14, 12);
  // Eyes
  ctx.fillStyle = '#3b2010';
  ctx.fillRect(-4, -25, 3, 3);
  ctx.fillRect(2, -25, 3, 3);
  // Smile
  ctx.fillStyle = '#c06070';
  ctx.fillRect(-3, -18, 6, 2);
  // School shirt - navy/orange
  ctx.fillStyle = '#1a1a4e';
  ctx.fillRect(-7, -16, 14, 12);
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(-7,-16,14,2);
  ctx.fillRect(-7,-6,14,2);
  // Diaper
  ctx.fillStyle = '#fff';
  ctx.fillRect(-7, -4, 14, 10);
  ctx.fillStyle = '#aad4ff';
  ctx.fillRect(-5,-2,10,6);
  ctx.restore();
}

function drawRafaela(x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Brown curly hair
  ctx.fillStyle = '#6b3a1f';
  ctx.fillRect(-10, -48, 20, 10);
  ctx.fillRect(-12, -44, 4, 18);
  ctx.fillRect(8, -44, 4, 18);
  // Face
  ctx.fillStyle = '#f5c5a3';
  ctx.fillRect(-8, -44, 16, 14);
  // Pink glasses
  ctx.strokeStyle = '#ffb6c1';
  ctx.lineWidth = 2;
  ctx.strokeRect(-8, -41, 7, 7);
  ctx.strokeRect(1, -41, 7, 7);
  ctx.beginPath(); ctx.moveTo(-1,-37); ctx.lineTo(1,-37); ctx.stroke();
  // Eyes
  ctx.fillStyle = '#3b2010';
  ctx.fillRect(-5, -40, 3, 3);
  ctx.fillRect(2, -40, 3, 3);
  // School uniform - navy with orange
  ctx.fillStyle = '#1a1a4e';
  ctx.fillRect(-8, -30, 16, 14);
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(-8,-30,16,2);
  ctx.fillRect(-8,-18,16,2);
  // Skirt
  ctx.fillStyle = '#1a1a4e';
  ctx.fillRect(-9, -16, 18, 10);
  // Legs
  ctx.fillStyle = '#f5c5a3';
  ctx.fillRect(-7, -6, 5, 10);
  ctx.fillRect(2, -6, 5, 10);
  // Shoes
  ctx.fillStyle = '#222';
  ctx.fillRect(-8, 4, 6, 4);
  ctx.fillRect(2, 4, 6, 4);
  ctx.restore();
}

function drawHusband(x, y) {
  ctx.save();
  ctx.translate(x, y);
  // Red beard
  ctx.fillStyle = '#b04020';
  ctx.fillRect(-12, -48, 24, 16);
  // Face
  ctx.fillStyle = '#f0c090';
  ctx.fillRect(-11, -62, 22, 20);
  // Glasses
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.strokeRect(-10, -58, 8, 7);
  ctx.strokeRect(2, -58, 8, 7);
  ctx.beginPath(); ctx.moveTo(-2,-54); ctx.lineTo(2,-54); ctx.stroke();
  // Hair
  ctx.fillStyle = '#b04020';
  ctx.fillRect(-11, -66, 22, 8);
  // Shirt - blue
  ctx.fillStyle = '#1a4a8a';
  ctx.fillRect(-12, -42, 24, 18);
  // Jacket
  ctx.fillStyle = '#1a2a4a';
  ctx.fillRect(-14, -42, 6, 18);
  ctx.fillRect(8, -42, 6, 18);
  // Pants
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(-12, -24, 24, 16);
  // Legs
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(-11, -8, 9, 14);
  ctx.fillRect(2, -8, 9, 14);
  ctx.fillStyle = '#222';
  ctx.fillRect(-12, 6, 10, 5);
  ctx.fillRect(2, 6, 10, 5);
  ctx.restore();
}

// ═══════════════════════════════════════════
// PLATFORM PHYSICS
// ═══════════════════════════════════════════
class Player {
  constructor() { this.reset(); }
  reset() {
    this.x = 80; this.y = 380; this.vx = 0; this.vy = 0;
    this.w = 20; this.h = 55; this.onGround = false;
    this.dir = 1; this.frame = 0; this.attackTimer = 0;
    this.invincible = 0;
  }
  get cx() { return this.x + this.w/2; }
  get bottom() { return this.y + this.h; }
  get rect() { return {x:this.x, y:this.y, w:this.w, h:this.h}; }
}

let player = new Player();

class PhysObj {
  constructor(x,y,w,h) { this.x=x; this.y=y; this.w=w; this.h=h; }
  get rect() { return {x:this.x, y:this.y, w:this.w, h:this.h}; }
}

function rectsOverlap(a,b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
let platforms = [];
let enemies = [];
let collectibles = [];
let goal = null;
let bgColor = '#1a0a2e';
let bgObjects = [];

class Enemy {
  constructor(x,y,type,patrol) {
    this.x=x; this.y=y; this.type=type;
    this.w=28; this.h=38; this.vx=-1.5; this.hp=2;
    this.patrol=patrol||[x-60,x+60];
    this.dir=-1; this.frame=0; this.dead=false;
  }
  get rect(){return{x:this.x,y:this.y,w:this.w,h:this.h};}
}

class Collectible {
  constructor(x,y,type){ this.x=x; this.y=y; this.type=type; this.taken=false; }
  get rect(){return{x:this.x,y:this.y,w:20,h:20};}
}

// ═══════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════
let camX = 0;

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════
function spawnParticles(x, y, color, count=8) {
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*6,
      vy: -Math.random()*5-2,
      life: 1, decay: 0.03+Math.random()*0.02,
      color, size: 4+Math.random()*6
    });
  }
}

function spawnStars(x, y) {
  let colors = ['#ff69b4','#ffd700','#ff6600','#00ff88'];
  spawnParticles(x, y, colors[Math.floor(Math.random()*colors.length)], 12);
}

// ═══════════════════════════════════════════
// BACKGROUNDS
// ═══════════════════════════════════════════
function drawBackground() {
  // Sky
  ctx.fillStyle = bgColor;
  ctx.fillRect(0,0,W,H);

  if(phase===1){
    // Clouds
    ctx.fillStyle = '#ffffffcc';
    for(let i=0;i<4;i++){
      let cx2 = ((i*200 - camX*0.3) % (W+100) + W+100) % (W+100) - 50;
      ctx.beginPath();
      ctx.arc(cx2,60+i*20,30,0,Math.PI*2);
      ctx.arc(cx2+30,50+i*20,40,0,Math.PI*2);
      ctx.arc(cx2+60,60+i*20,25,0,Math.PI*2);
      ctx.fill();
    }
    // Sun
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(700, 60, 40, 0, Math.PI*2);
    ctx.fill();
    // Houses in bg
    for(let i=0;i<5;i++){
      let hx = ((i*160 - camX*0.5) % (W+160) + W+160) % (W+160) - 80;
      ctx.fillStyle = '#c8a87a';
      ctx.fillRect(hx, 330, 60, 60);
      ctx.fillStyle = '#e05050';
      ctx.beginPath();
      ctx.moveTo(hx-10, 330);
      ctx.lineTo(hx+30, 300);
      ctx.lineTo(hx+70, 330);
      ctx.fill();
      ctx.fillStyle = '#8ad';
      ctx.fillRect(hx+5,350,20,20);
      ctx.fillRect(hx+35,350,20,20);
    }
  } else if(phase===2){
    // Morning sky gradient
    ctx.fillStyle = '#ffd89b';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ffb347';
    ctx.fillRect(0,H-200,W,200);
    // School building in bg
    let sx = 500 - camX*0.4;
    ctx.fillStyle = '#e8d0c0';
    ctx.fillRect(sx%W, 200, 200, 200);
    ctx.fillStyle = '#c05050';
    ctx.fillRect((sx%W)-10, 190, 220, 20);
    // Trees
    for(let i=0;i<6;i++){
      let tx = ((i*130 - camX*0.6) % (W+130) + W+130) % (W+130) - 65;
      ctx.fillStyle = '#5a8a3a';
      ctx.beginPath();
      ctx.arc(tx, 350, 30, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#4a2a0a';
      ctx.fillRect(tx-5, 370, 10, 30);
    }
  } else if(phase===3){
    // Indoor house
    ctx.fillStyle = '#f5e6d0';
    ctx.fillRect(0,0,W,H);
    // Wallpaper pattern
    for(let i=0;i<8;i++){
      for(let j=0;j<5;j++){
        let wx = (i*100 - camX*0.1) % W;
        ctx.fillStyle = '#ddd0c0';
        ctx.fillRect(wx, j*80, 2, 60);
      }
    }
    // Floor
    ctx.fillStyle = '#c8a87a';
    ctx.fillRect(0,H-100,W,100);
    for(let i=0;i<12;i++){
      ctx.fillStyle = '#b8985a';
      ctx.fillRect(i*70 - (camX*0.1)%70, H-100, 2, 100);
    }
    // Furniture in bg
    ctx.fillStyle = '#8a5a3a';
    ctx.fillRect(200 - camX*0.2, 300, 150, 80);
    ctx.fillStyle = '#6a3a2a';
    ctx.fillRect(200 - camX*0.2, 280, 160, 25);
  } else if(phase===4){
    // Kitchen
    ctx.fillStyle = '#fff0e0';
    ctx.fillRect(0,0,W,H);
    // Tiles
    for(let i=0;i<12;i++){
      for(let j=0;j<6;j++){
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth=1;
        ctx.strokeRect(i*70-(camX*0.05)%70, j*80, 70, 80);
      }
    }
    // Counter/kitchen elements
    ctx.fillStyle = '#d4b08a';
    ctx.fillRect(100-camX*0.2, 310, 120, 60);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(110-camX*0.2, 295, 100, 20);
    // Fridge bg
    ctx.fillStyle = '#eee';
    ctx.fillRect(400-camX*0.2, 240, 70, 150);
    ctx.strokeStyle = '#ccc';
    ctx.strokeRect(400-camX*0.2, 240, 70, 150);
  } else if(phase===5){
    // Night/dramatic
    ctx.fillStyle = '#0a1a3e';
    ctx.fillRect(0,0,W,H);
    // Stars in sky
    for(let i=0;i<50;i++){
      let sx2 = (i*37 - camX*0.1) % W;
      let sy2 = 20 + (i*17)%200;
      let br = Math.sin(time*0.05+i)*0.5+0.5;
      ctx.fillStyle = `rgba(255,255,255,${br})`;
      ctx.fillRect(sx2,sy2,2,2);
    }
    // Moon
    ctx.fillStyle = '#fffacd';
    ctx.beginPath();
    ctx.arc(700, 60, 45, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#0a1a3e';
    ctx.beginPath();
    ctx.arc(715, 50, 40, 0, Math.PI*2);
    ctx.fill();
    // Dramatic bg buildings
    for(let i=0;i<5;i++){
      let bx = ((i*160 - camX*0.3) % (W+160) + W+160) % (W+160) - 80;
      ctx.fillStyle = '#0d1f3a';
      ctx.fillRect(bx, 200, 60, 200);
      for(let j=0;j<3;j++){
        for(let k=0;k<2;k++){
          ctx.fillStyle = Math.random()>0.8?'#ffffaa':'#111e30';
          ctx.fillRect(bx+5+k*25, 210+j*40, 15, 20);
        }
      }
    }
  }
}

// ═══════════════════════════════════════════
function drawPlatform(p) {
  let px = p.x - camX;
  if(px > W+100 || px+p.w < -100) return;

  let colors = ['#8B5e3c','#a0743e','#6B4423'];
  if(phase===1){ colors=['#7cb87c','#5a9a5a','#4a8a4a']; }
  else if(phase===2){ colors=['#c8a060','#b89050','#a87040']; }
  else if(phase===3){ colors=['#c8a87a','#b8985a','#a8884a']; }
  else if(phase===4){ colors=['#d4b890','#c4a880','#b49870']; }
  else if(phase===5){ colors=['#1a3a6a','#0a2a5a','#142858']; }

  // Platform body
  ctx.fillStyle = colors[0];
  ctx.fillRect(px, p.y, p.w, p.h);
  ctx.fillStyle = colors[1];
  ctx.fillRect(px, p.y, p.w, 4);
  ctx.fillStyle = colors[2];
  ctx.fillRect(px, p.y+4, p.w, 2);

  // Decorations
  if(p.h > 20) {
    for(let i=0;i<p.w;i+=20) {
      ctx.fillStyle = colors[2];
      ctx.fillRect(px+i, p.y, 2, p.h);
    }
  }
}

// ═══════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════
const GRAVITY = 0.5;
const JUMP = -12;
const SPEED = 4;
const PHASE_WIDTH = [0,1650,1650,1700,1700,1750];

function update() {
  if(state!=='PLAYING') return;
  time++;

  // Player movement
  let moving = false;
  if(keys['ArrowLeft'] || keys['a']) { player.vx = -SPEED; player.dir=-1; moving=true; }
  else if(keys['ArrowRight'] || keys['d']) { player.vx = SPEED; player.dir=1; moving=true; }
  else { player.vx *= 0.7; }

  if((keys['ArrowUp']||keys[' ']||keys['w']) && player.onGround) {
    player.vy = JUMP;
    player.onGround = false;
    spawnParticles(player.x+player.w/2, player.y+player.h, '#ff69b480', 5);
  }

  if(keys['z']||keys['Z']||keys['x']||keys['X']) {
    if(player.attackTimer<=0) {
      player.attackTimer = 15;
      // Check hit enemies
      enemies.forEach(e=>{
        if(!e.dead){
          let attackRect = {
            x: player.dir>0 ? player.x+player.w : player.x-40,
            y: player.y, w:40, h:player.h
          };
          if(rectsOverlap(attackRect, e.rect)){
            e.hp--;
            spawnStars(e.x+e.w/2, e.y);
            if(e.hp<=0){ e.dead=true; score+=100; spawnStars(e.x+e.w/2, e.y); }
          }
        }
      });
    }
  }

  if(player.attackTimer > 0) player.attackTimer--;
  if(player.invincible > 0) player.invincible--;

  // Gravity
  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;
  if(moving) player.frame++;

  // Clamp to world
  if(player.x < 0) player.x = 0;
  if(player.x > PHASE_WIDTH[phase]) player.x = PHASE_WIDTH[phase];

  // Platform collision
  player.onGround = false;
  platforms.forEach(p=>{
    if(rectsOverlap(player.rect, p.rect)) {
      // From above
      if(player.vy > 0 && player.y + player.h - player.vy <= p.y + 4) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if(player.vy < 0 && player.y - player.vy >= p.y+p.h-4) {
        player.y = p.y + p.h;
        player.vy = 0;
      } else {
        if(player.vx > 0) player.x = p.x - player.w;
        else player.x = p.x + p.w;
        player.vx = 0;
      }
    }
  });

  // Fall out
  if(player.y > H + 100) {
    hp--;
    if(hp<=0){ state='GAME_OVER'; return; }
    player.x = Math.max(0, camX);
    player.y = 200;
    player.vy = 0;
  }

  // Enemy update
  enemies.forEach(e=>{
    if(e.dead) return;
    e.frame++;
    e.x += e.vx;
    if(e.x < e.patrol[0]){ e.vx=Math.abs(e.vx); e.dir=1; }
    if(e.x > e.patrol[1]){ e.vx=-Math.abs(e.vx); e.dir=-1; }
    // Stomp kill
    if(player.vy>0 && player.invincible<=0) {
      if(rectsOverlap(player.rect, e.rect) &&
         player.y + player.h - player.vy <= e.y + 8) {
        e.hp--;
        player.vy = -8;
        spawnStars(e.x+e.w/2, e.y);
        if(e.hp<=0){ e.dead=true; score+=150; }
      }
    }
    // Touch damage
    if(player.invincible<=0 && rectsOverlap(player.rect, e.rect)){
      hp--;
      player.invincible = 60;
      player.vy = -7;
      spawnParticles(player.cx, player.y+player.h/2, '#f00', 8);
      if(hp<=0){ state='GAME_OVER'; return; }
    }
  });

  // Collectibles
  collectibles.forEach(c=>{
    if(!c.taken && rectsOverlap(player.rect, c.rect)){
      c.taken=true; score+=50;
      spawnStars(c.x+10, c.y+10);
    }
  });

  // Goal check
  if(goal){
    let gr = {x:goal.x-camX, y:goal.y, w:goal.w, h:goal.h};
    // use world coords
    let gr2 = {x:goal.x, y:goal.y, w:goal.w, h:goal.h};
    // Distancia simples entre player e goal (mais facil de acertar)
    let pdx = (player.x + player.w/2) - (goal.x + goal.w/2);
    let pdy = (player.y + player.h/2) - (goal.y + goal.h/2);
    let dist = Math.sqrt(pdx*pdx + pdy*pdy);
    if(dist < 100){
      state='PHASE_END';
      phaseEndTimer=0;
      setupPhaseEnd();
    }
  }

  // Camera
  let targetCam = player.x - W/3;
  targetCam = Math.max(0, Math.min(targetCam, PHASE_WIDTH[phase]-W));
  camX += (targetCam - camX) * 0.1;

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15;
    p.life-=p.decay;
  });
  particles = particles.filter(p=>p.life>0);

  // Update HUD
  document.getElementById('hpDisplay').textContent = '❤️'.repeat(Math.max(0,hp));
  document.getElementById('scoreDisplay').textContent = score;
}

// ═══════════════════════════════════════════
// PHASE END SCENES
// ═══════════════════════════════════════════
let phaseEndScene = null;

function setupPhaseEnd() {
  if(phase===1){
    phaseEndScene = {type:'diaper', text:'Gyzinha trocou a fralda da Micaela! 👶✨', color:'#ff69b4'};
  } else if(phase===2){
    phaseEndScene = {type:'school', text:'Rafaela está pronta para a escola! 🚌📚', color:'#ffd700'};
  } else if(phase===3){
    phaseEndScene = {type:'house', text:'Casa limpa e brilhando! ✨🏠', color:'#7cfc00'};
  } else if(phase===4){
    phaseEndScene = {type:'cake_stolen', text:'VILÃO ROUBOU O BOLO! 😱🎂', color:'#ff4444'};
  } else if(phase===5){
    state = 'WIN';
    return;
  }
}

// ═══════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════
function draw() {
  ctx.clearRect(0,0,W,H);

  if(state==='TITLE') {
    drawTitle();
  } else if(state==='PLAYING' || state==='PHASE_END') {
    // Background
    drawBackground();

    // World objects
    ctx.save();
    platforms.forEach(drawPlatform);

    // Collectibles
    collectibles.forEach(drawCollectible);

    // Goal
    if(goal) drawGoal(goal);

    // Enemies
    enemies.forEach(e=>{
      if(e.dead) return;
      ctx.save();
      ctx.translate(-camX, 0);
      ctx.restore();
      drawEnemy(e);
      // enemies are drawn in world space adjusted
    });
    ctx.restore();

    // Player (with camera)
    ctx.save();
    if(player.invincible > 0 && Math.floor(time/4)%2===0) {
      ctx.globalAlpha = 0.4;
    }
    drawGyzinha(
      player.x - camX,
      player.y + player.h,
      player.dir, player.frame,
      player.attackTimer
    );
    ctx.restore();

    // Particles
    particles.forEach(p=>{
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    });
    ctx.globalAlpha=1;

    if(state==='PHASE_END') {
      drawPhaseEnd();
    }

  } else if(state==='GAME_OVER') {
    drawGameOver();
  } else if(state==='WIN') {
    drawWin();
  }
}

// Note: enemies need camera offset fix

function drawEnemyFixed(e) {
  if(e.dead) return;
  let oldX = e.x;
  e.x -= camX;
  drawEnemy(e);
  e.x = oldX;
}

function drawPhaseEnd() {
  phaseEndTimer++;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  if(!phaseEndScene) return;

  let prog = Math.min(phaseEndTimer / 60, 1);

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(prog, prog);

  // Box
  ctx.fillStyle = phaseEndScene.color+'cc';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth=4;
  roundRect(-280,-120,560,240,20,true,true);

  ctx.font = 'bold 30px Fredoka One';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth=2;

  if(phaseEndScene.type==='diaper'){
    ctx.font='60px serif';
    ctx.fillText('👶',0,-40);
    ctx.font='bold 22px Fredoka One';
    ctx.fillText('Micaela com fralda nova! ✨', 0, 20);
    ctx.font='16px Nunito';
    ctx.fillStyle='#ffe';
    ctx.fillText(phaseEndScene.text, 0, 55);
  } else if(phaseEndScene.type==='school'){
    ctx.font='60px serif';
    ctx.fillText('🚌',0,-40);
    ctx.font='bold 22px Fredoka One';
    ctx.fillStyle='#fff';
    ctx.fillText('Rafaela na van para a escola!', 0, 20);
    ctx.font='16px Nunito';
    ctx.fillStyle='#ffe';
    ctx.fillText(phaseEndScene.text, 0, 55);
  } else if(phaseEndScene.type==='house'){
    ctx.font='60px serif';
    ctx.fillText('✨',0,-40);
    ctx.font='bold 22px Fredoka One';
    ctx.fillStyle='#fff';
    ctx.fillText('Casa Impecável!', 0, 20);
    ctx.font='16px Nunito';
    ctx.fillStyle='#ffe';
    ctx.fillText(phaseEndScene.text, 0, 55);
  } else if(phaseEndScene.type==='cake_stolen'){
    ctx.font='50px serif';
    ctx.fillText('😱', -40, -30);
    ctx.fillText('🎂', 40, -30);
    ctx.font='bold 22px Fredoka One';
    ctx.fillStyle='#ff4';
    ctx.fillText('O VILÃO ROUBOU O BOLO!', 0, 20);
    ctx.font='16px Nunito';
    ctx.fillStyle='#ffe';
    ctx.fillText('Não! O bolo de aniversário! Vá atrás, Gyzinha!', 0, 55);
  }

  ctx.restore();

  if(phaseEndTimer > 150 && Math.floor(time/25)%2===0){
    ctx.font='bold 18px Fredoka One';
    ctx.fillStyle='#ffd700';
    ctx.textAlign='center';
    ctx.fillText('▶ Toque para continuar...', W/2, H-20);
  }
}

function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill) ctx.fill();
  if(stroke) ctx.stroke();
}

function drawGameOver() {
  ctx.fillStyle = '#0a0010';
  ctx.fillRect(0,0,W,H);
  // Sad stars
  for(let i=0;i<20;i++){
    ctx.fillStyle='rgba(200,100,100,0.3)';
    ctx.beginPath();
    ctx.arc((i*71)%W, (i*43)%H, 2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.font='bold 60px Fredoka One';
  ctx.textAlign='center';
  ctx.fillStyle='#ff4444';
  ctx.strokeStyle='#880000';
  ctx.lineWidth=4;
  ctx.strokeText('😢 FIM DE JOGO!', W/2, 200);
  ctx.fillText('😢 FIM DE JOGO!', W/2, 200);
  ctx.font='bold 24px Fredoka One';
  ctx.fillStyle='#ffaa88';
  ctx.fillText('O bolo continua sequestrado...', W/2, 260);
  ctx.font='16px Nunito';
  ctx.fillStyle='#ff9999';
  ctx.fillText('Não desista, Gyzinha! Sua família precisa de você! 💪', W/2, 310);

  if(Math.floor(time/25)%2===0){
    ctx.font='bold 22px Fredoka One';
    ctx.fillStyle='#ffd700';
    ctx.fillText('▶ Toque para Tentar Novamente', W/2, 380);
  }
}

function drawWin() {
  time++;
  // Festive background
  let grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#ff1493');
  grad.addColorStop(0.5,'#9400d3');
  grad.addColorStop(1,'#ff6600');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Confetti
  for(let i=0;i<80;i++){
    let x2 = ((i*97+time*2) % W);
    let y2 = ((i*53+time*(1+i%3)) % H);
    let cols=['#ff69b4','#ffd700','#ff6600','#00ff88','#00ccff','#ff44aa'];
    ctx.fillStyle=cols[i%cols.length];
    ctx.save();
    ctx.translate(x2,y2);
    ctx.rotate(time*0.05+i);
    ctx.fillRect(-4,-2,8,4);
    ctx.restore();
  }

  // Big HB text
  ctx.font='bold 54px Fredoka One';
  ctx.textAlign='center';
  ctx.strokeStyle='#4a0080';
  ctx.lineWidth=6;
  ctx.strokeText('🎉 FELIZ ANIVERSÁRIO 🎉', W/2, 80);
  ctx.fillStyle='#fff';
  ctx.fillText('🎉 FELIZ ANIVERSÁRIO 🎉', W/2, 80);

  ctx.font='bold 38px Fredoka One';
  ctx.strokeText('GYZINHA! 🎂', W/2, 130);
  ctx.fillStyle='#ffd700';
  ctx.fillText('GYZINHA! 🎂', W/2, 130);

  // Family scene
  // Ground
  ctx.fillStyle='#c8a87a';
  ctx.fillRect(0,400,W,H);

  // Table with cake
  ctx.fillStyle='#8B5e3c';
  ctx.fillRect(300, 350, 200, 20);
  ctx.fillRect(340, 370, 15, 50);
  ctx.fillRect(445, 370, 15, 50);

  // Cake on table
  ctx.fillStyle='#ffccaa';
  ctx.fillRect(360, 300, 80, 55);
  ctx.fillStyle='#ff69b4';
  ctx.fillRect(355, 296, 90, 12);
  for(let i=0;i<3;i++){
    ctx.fillStyle='#ffd700';
    ctx.fillRect(370+i*20, 280, 4, 20);
    ctx.fillStyle='#ff6600';
    ctx.fillRect(369+i*20, 275, 6, 8);
    // Flame
    ctx.fillStyle='#ff0';
    let flicker = Math.sin(time*0.2+i)*2;
    ctx.beginPath();
    ctx.arc(372+i*20, 274+flicker, 4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.font='14px Fredoka One';
  ctx.fillStyle='#ff1493';
  ctx.textAlign='center';
  ctx.fillText('GYZINHA', 400, 340);

  // Family
  drawHusband(150, 450);
  drawGyzinha(280, 450, 1, 0, 0);
  drawRafaela(490, 450, 0);
  drawMicaela(560, 460, 0);

  // Gyzinha smile / hearts
  ctx.font='24px serif';
  ctx.fillText('❤️', 200, 350);
  ctx.fillText('❤️', 350, 340);
  ctx.fillText('🎊', 520, 360);

  // Message
  ctx.font='bold 20px Fredoka One';
  ctx.strokeStyle='#4a0080';
  ctx.lineWidth=3;
  ctx.strokeText('A família reunida com o bolo recuperado! 🎂✨', W/2, 180);
  ctx.fillStyle='#fff';
  ctx.fillText('A família reunida com o bolo recuperado! 🎂✨', W/2, 180);

  ctx.font='16px Nunito';
  ctx.fillStyle='#ffe';
  ctx.fillText('Obrigado por jogar! Com amor da sua família! 💕', W/2, 215);

  if(Math.floor(time/30)%2===0){
    ctx.font='bold 20px Fredoka One';
    ctx.fillStyle='#ffd700';
    ctx.fillText('▶ Toque para Jogar Novamente', W/2, 478);
  }
}

// ═══════════════════════════════════════════
// OVERRIDE DRAW WITH PROPER ENEMY RENDER
// ═══════════════════════════════════════════
const _origDraw = draw;

function gameLoop() {
  ctx.clearRect(0,0,W,H);

  if(state==='TITLE') {
    drawTitle();
  } else if(state==='PLAYING' || state==='PHASE_END') {
    drawBackground();
    platforms.forEach(drawPlatform);
    collectibles.forEach(drawCollectible);
    if(goal) drawGoal(goal);
    enemies.forEach(e=>drawEnemyFixed(e));

    // Player
    ctx.save();
    if(player.invincible > 0 && Math.floor(time/4)%2===0) ctx.globalAlpha=0.4;
    drawGyzinha(player.x-camX, player.y+player.h, player.dir, player.frame, player.attackTimer);
    ctx.restore();

    // Particles
    ctx.save();
    particles.forEach(p=>{
      ctx.fillStyle=p.color;
      ctx.globalAlpha=p.life;
      ctx.fillRect(p.x-p.size/2-camX*0, p.y-p.size/2, p.size, p.size);
    });
    ctx.globalAlpha=1;
    ctx.restore();

    // Phase end overlay
    if(state==='PHASE_END') drawPhaseEnd();

    // Phase tip
    if(state==='PLAYING' && time < 200) {
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(0, H-60, W, 60);
      ctx.font='bold 15px Fredoka One';
      ctx.textAlign='center';
      ctx.fillStyle='#ffd700';
      let tips = [
        'Fase 1: Chega até a Micaela para trocar sua fralda!',
        'Fase 2: Leve a Rafaela até a van da escola!',
        'Fase 3: Limpe a casa e chegue ao fim da fase!',
        'Fase 4: Colete ingredientes e faça o bolo!',
        'Fase 5: Derrote os minions e recupere o bolo!',
      ];
      ctx.fillText(tips[phase-1], W/2, H-30);
    }

  } else if(state==='GAME_OVER') {
    drawGameOver();
  } else if(state==='WIN') {
    drawWin();
  }

  update();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
// INPUT - KEYBOARD + TOUCH
// ═══════════════════════════════════════════
function advanceState() {
  if(state==='TITLE'){
    phase=1; hp=3; score=0;
    buildPhase(1);
    state='PLAYING';
    camX=0;
  } else if(state==='PHASE_END' && phaseEndTimer>150){
    if(phase===4 && phaseEndScene && phaseEndScene.type==='cake_stolen'){
      phase=5;
    } else if(phase < 5) {
      phase++;
    }
    hp=Math.min(3, hp+1);
    buildPhase(phase);
    state='PLAYING';
    camX=0;
    phaseEndScene=null;
  } else if(state==='GAME_OVER'){
    phase=1; hp=3; score=0;
    buildPhase(1);
    state='PLAYING';
    camX=0;
  } else if(state==='WIN'){
    state='TITLE';
    phase=1; hp=3; score=0;
    time=0;
  }
}

document.addEventListener('keydown', e=>{
  keys[e.key]=true;
  if(e.key==='Enter' || (e.key===' ' && state!=='PLAYING')) advanceState();
  if(e.key===' ') e.preventDefault();
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

// Mobile button helpers
function bindBtn(id, keyName) {
  const el = document.getElementById(id);
  if(!el) return;
  const press = (e) => { e.preventDefault(); keys[keyName]=true; el.classList.add('pressed'); };
  const release = (e) => { e.preventDefault(); keys[keyName]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}
bindBtn('btnLeft', 'ArrowLeft');
bindBtn('btnRight', 'ArrowRight');
bindBtn('btnJump', 'ArrowUp');
bindBtn('btnAttack', 'z');

// Tap on canvas/screen to advance non-playing states
canvas.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  if(state!=='PLAYING') advanceState();
}, {passive:false});
canvas.addEventListener('click', ()=>{ if(state!=='PLAYING') advanceState(); });

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
gameLoop();
</script>
